<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 论文待读列表</title>
  <link rel="stylesheet" href="static/css/app.css">
</head>

<body>

  <div id="appContainer" class="paper-container">
    <div class="header-main">
      <div>
        <h1>论文待读列表</h1>
        <p class="subtitle" id="subtitle"></p>
      </div>
      <div class="stats" id="stats"></div>
      <div id="bgStatus" class="bg-status"></div>
      <div style="margin-left: auto;"></div>
      <div class="header-actions">
        <button class="btn" onclick="PaperApp.redetectLayout()" style="border-color:var(--accent);color:var(--accent)">重检布局</button>
        <button class="btn" id="techTermsBtn" onclick="TechTermsApp.toggle()" style="border-color:#a78bfa;color:#a78bfa">术语表</button>
        <button class="btn" id="syncBtn" onclick="PaperApp.syncEmails()"
          style="border-color:var(--green);color:var(--green)">邮箱同步</button>
        <button class="btn" id="importUrlBtn" onclick="PaperApp.openImportUrlModal()"
          style="border-color:#1da1f2;color:#1da1f2">URL导入</button>
        <button class="btn btn-primary" onclick="PaperApp.openAddModal()">＋ 添加</button>
      </div>
    </div>

    <div class="toolbar">
      <select id="filterCat" onchange="PaperApp.resetAndReload()">
        <option value="">全部分类</option>
      </select>
      <select id="filterStatus" onchange="PaperApp.resetAndReload()">
        <option value="">全部状态</option>
        <option value="unread">未读</option>
        <option value="reading">阅读中</option>
        <option value="done">已读</option>
      </select>
      <select id="filterCached" onchange="PaperApp.resetAndReload()">
        <option value="">全部</option>
        <option value="cached">已缓存</option>
        <option value="uncached">未缓存</option>
      </select>
      <select id="filterSourceType" onchange="PaperApp.resetAndReload()">
        <option value="">全部来源</option>
        <option value="paper">论文</option>
        <option value="wechat_article">微信文章</option>
        <!-- <option value="twitter_thread">推文</option> -->
        <option value="blog_post">博客</option>
        <option value="video">视频</option>
      </select>
      <select id="sortBy" onchange="PaperApp.resetAndReload()">
        <option value="priority">按优先级 ↓</option>
        <option value="priority_asc">按优先级 ↑</option>
        <option value="stars">按 AI 推荐 ↓</option>
        <option value="stars_asc">按 AI 推荐 ↑</option>
        <option value="date">按时间 ↓</option>
        <option value="date_asc">按时间 ↑</option>
        <option value="title">按标题 ↓</option>
        <option value="title_asc">按标题 ↑</option>
      </select>
      <input type="text" id="searchBox" placeholder="搜索标题/作者/标签..." oninput="PaperApp.resetAndReload()">
      <select id="layoutMode" onchange="PaperApp.resetAndReload()" style="width:auto">
        <option value="grid" selected>网格</option>
        <option value="list">列表</option>
      </select>
    </div>

    <div id="paperList"></div>
    <div id="loadMoreSentinel" style="height:1px"></div>

    <!-- 术语管理面板 -->
    <div id="techTermsPanel" style="display:none">
      <div class="header">
        <div>
          <h1 class="cat-header" style="margin:0;border:none;padding:0">技术术语字典</h1>
          <p class="subtitle" id="techTermsSubtitle">加载中...</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn" onclick="TechTermsApp.exportJson()">导出 ↓</button>
          <button class="btn" onclick="document.getElementById('techTermsImportFile').click()">↑ 导入</button>
          <input type="file" id="techTermsImportFile" accept=".json" style="display:none" onchange="TechTermsApp.importJson(this)">
          <button class="btn" onclick="TechTermsApp.hide()">返回论文</button>
        </div>
      </div>

      <div class="stats" id="techTermsStats"></div>

      <div class="toolbar">
        <select id="techTermsFilter" onchange="TechTermsApp.render()">
          <option value="">全部</option>
          <option value="0">待审核</option>
          <option value="1">已审核</option>
          <option value="candidate">候选</option>
        </select>
        <select id="techTermsSort" onchange="TechTermsApp.render()" style="width:auto">
          <option value="">默认（未审核优先）</option>
          <option value="count">按使用次数</option>
          <option value="name">按英文名</option>
          <option value="zh">按中文名</option>
          <option value="date">按最新</option>
        </select>
        <input type="text" id="techTermsSearch" placeholder="搜索术语..." oninput="TechTermsApp.render()">
        <button class="btn btn-primary" onclick="TechTermsApp.openAddModal()">＋ 添加术语</button>
      </div>

      <div id="techTermsList"></div>

      <!-- 术语模态框 -->
      <div class="modal-overlay" id="techTermsModal">
        <div class="modal">
          <h2 id="techTermsModalTitle">添加术语</h2>
          <input type="hidden" id="techTermsEditId">
          <label>英文术语 *</label>
          <input type="text" id="techTermsEn" placeholder="如 transformer">
          <label>中文翻译 *</label>
          <input type="text" id="techTermsZh" placeholder="如 Transformer/变换器">
          <label>上下文（可选，用于区分不同翻译）</label>
          <input type="text" id="techTermsContext" placeholder="如 视觉模型,推荐系统">
          <div class="modal-actions">
            <button class="btn" onclick="TechTermsApp.closeModal()">取消</button>
            <button class="btn btn-primary" onclick="TechTermsApp.save()">保存</button>
          </div>
        </div>
      </div>
    </div>

    <!-- URL 导入模态框 -->
    <div class="modal-overlay" id="importUrlModal">
      <div class="modal">
        <h2>从 URL 导入</h2>
        <p style="font-size:.8rem;color:var(--muted);margin-bottom:12px">支持微信文章、技术博客、arXiv 论文等。AI
          将自动提取标题、摘要、分类。</p>
        <label>URL *</label>
        <input type="text" id="importUrl" placeholder="https://mp.weixin.qq.com/s/... 或 https://x.com/...">
        <label>优先级 (1-5)</label>
        <input type="number" id="importPriority" min="1" max="5" value="3">
        <label>补充标签（可选）</label>
        <input type="text" id="importTags" placeholder="tag1, tag2（AI 会自动生成，这里可补充）">
        <label>备注（可选）</label>
        <input type="text" id="importNotes" placeholder="来源说明、阅读背景...">
        <div id="importResult"
          style="display:none;margin-top:12px;padding:10px 12px;border-radius:6px;font-size:.82rem;border:1px solid var(--border)">
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="PaperApp.closeImportUrlModal()">取消</button>
          <button class="btn btn-primary" id="importUrlSubmit" onclick="PaperApp.doImportUrl()">AI 导入</button>
        </div>
      </div>
    </div>

    <!-- 添加/编辑模态框 -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <h2 id="modalTitle">添加论文</h2>
        <input type="hidden" id="editId">
        <label>标题 *</label>
        <input type="text" id="fTitle" placeholder="论文标题">
        <label>作者</label>
        <input type="text" id="fAuthors" placeholder="作者列表">
        <label>来源</label>
        <select id="fSource">
          <option value="arXiv">arXiv</option>
          <option value="ACM DL">ACM DL</option>
          <option value="Oxford Computer Journal">Oxford</option>
          <option value="ResearchGate">ResearchGate</option>
          <option value="微信公众号">微信公众号</option>
          <option value="Twitter/X">Twitter/X</option>
          <option value="Blog">Blog</option>
          <option value="其他">其他</option>
        </select>
        <label>内容类型</label>
        <select id="fSourceType">
          <option value="paper">论文</option>
          <option value="wechat_article">微信文章</option>
          <option value="blog_post">博客</option>
          <option value="video">视频</option>
          <option value="other">其他</option>
        </select>
        <label>链接</label>
        <input type="text" id="fUrl" placeholder="https://arxiv.org/abs/...">
        <label>arXiv ID</label>
        <input type="text" id="fArxivId" placeholder="如 2512.17452">
        <label>分类</label>
        <input type="text" id="fCategory" placeholder="如 KV Cache 优化">
        <label>优先级 (1-5)</label>
        <input type="number" id="fPriority" min="1" max="5" value="3">
        <label>标签（逗号分隔）</label>
        <input type="text" id="fTags" placeholder="tag1, tag2, tag3">
        <label>摘要</label>
        <textarea id="fAbstract" placeholder="论文核心内容..."></textarea>
        <label>笔记（支持 Markdown/LaTeX）</label>
        <textarea id="fNotes" placeholder="笔记...$$E=mc^2$$"></textarea>
        <div class="modal-actions">
          <button class="btn" onclick="PaperApp.closeModal()">取消</button>
          <button class="btn btn-primary" onclick="PaperApp.savePaper()">保存</button>
        </div>
      </div>
    </div>

    <!-- Markdown 阅读器模态框 -->
    <div class="modal-overlay" id="readerModal">
      <div class="modal" style="max-width:800px;max-height:90vh;overflow:auto">
        <h2 id="readerTitle">阅读</h2>
        <div id="readerContent" class="markdown-body"></div>
        <div class="modal-actions">
          <button class="btn" onclick="PaperApp.closeReader()">关闭</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="src/web/api.js"></script>
    <script src="src/web/components.js"></script>
    <script src="src/web/app.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('importUrl').addEventListener('keydown', e => {
          if (e.key === 'Enter') PaperApp.doImportUrl();
        });

        document.getElementById('modal').addEventListener('click', e => {
          if (e.target === document.getElementById('modal')) PaperApp.closeModal();
        });
        document.getElementById('importUrlModal').addEventListener('click', e => {
          if (e.target === document.getElementById('importUrlModal')) PaperApp.closeImportUrlModal();
        });

        document.getElementById('techTermsModal').addEventListener('click', e => {
          if (e.target === document.getElementById('techTermsModal')) TechTermsApp.closeModal();
        });

        document.getElementById('readerModal').addEventListener('click', e => {
          if (e.target === document.getElementById('readerModal')) PaperApp.closeReader();
        });

        PaperApp.init();
      });
    </script>
</body>

</html>
